<div class="list-container">
    <h2>Select a Knitting Pattern</h2>

    <div class="pattern-grid">
        @for (pattern of patterns(); track pattern.id) {
            <div class="pattern-card">
                <h3>{{ pattern.title }}</h3>
                <a [routerLink]="['/view', pattern.id]" class="select-btn">
                    Open Pattern
                </a>
            </div>
        } @empty {
            <p>No patterns uploaded yet. Go to the upload page to add one!</p>
        }
    </div>
</div>
