<div class="dashboard-wrapper">
    <div class="header-container">
        <h2 class="section-title">Your Knitting Patterns</h2>
        <button class="upload-btn" routerLink="/upload">
            Upload New Pattern
        </button>
    </div>
    <div class="pattern-grid">
        @for (pattern of patterns(); track pattern.id) {
        <div class="card-container">
            <a [routerLink]="['/view', pattern.id]" class="pattern-card-btn">
                @if (pattern.isWip) {
                <span class="wip-badge">WIP</span>
                }
                <div class="card-preview">
                    <app-pattern-thumbnail [patternId]="pattern.id"></app-pattern-thumbnail>
                </div>
                <div class="card-footer">
                    <h3 class="pattern-title">{{ pattern.title }}</h3>
                    <span class="action-tag">Uploaded: {{ pattern.uploadedDateTime | date }}</span>
                </div>
            </a>
        </div>
        } @empty {
        <p>No patterns uploaded yet. Go to the upload page to add one!</p>
        }
    </div>
</div>
