<div class="upload-container">
    <div class="header-container">
        <h2 class="section-title">Upload a New Knitting Pattern</h2>
        <a routerLink="/patterns" class="button">Back to List</a>
    </div>

    <!-- Title Input -->
    <div class="form-group">
        <label for="title" class="form-label">Pattern Title:</label>
        <input type="text" id="title" class="form-control" [(ngModel)]="patternTitle"
            placeholder="Enter pattern title" />
    </div>

    <!-- Distinct, Larger Description Box -->
    <div class="form-group">
        <label for="description" class="form-label">Pattern Description:</label>
        <textarea id="description" class="form-control description-box" rows="5" [(ngModel)]="patternDescription"
            placeholder="Enter pattern description (yarn weight, needle sizes, gauge, etc.)"></textarea>
    </div>

    <!-- Styled File Picker -->
    <div class="form-group">
        <label class="form-label">Select PDF:</label>

        <!-- Hidden native file input -->
        <input #fileInput type="file" id="file" (change)="onFileSelected($event)" accept=".pdf"
            class="file-input-hidden" />

        <!-- Custom Clickable Trigger Bar -->
        <div class="file-picker-bar" (click)="fileInput.click()">
            <span class="file-placeholder" [class.file-selected]="selectedFile">
                {{ selectedFile ? selectedFile.name : 'No PDF selected (.pdf)' }}
            </span>
            <span class="btn-browse">Browse</span>
        </div>
    </div>

    <!-- Upload Action Button -->
    <div class="actions-container">
        <button class="btn-upload" type="button" [disabled]="!patternTitle || !selectedFile" (click)="onUpload()"
            routerLink="/patterns">
            Upload Pattern
        </button>
    </div>
</div>
