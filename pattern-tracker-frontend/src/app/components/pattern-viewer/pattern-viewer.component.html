<div class="viewer-container">
    <div *ngIf="isLoading" class="loading-spinner">
        <p>Loading pattern data...</p>
    </div>
    <div *ngIf="errorMessage" class="error-banner">
        {{ errorMessage }}
    </div>
    <div *ngIf="!isLoading && patternData">
        <header class="pattern-header">
            <h1>{{ patternData.title }}</h1>
            <small>Pattern ID Reference: #{{ patternData.id }}</small>
        </header>
        <div class="viewer-window">
        <pdf-viewer 
            *ngIf="pdfSrc"
            [src]="pdfSrc"
            [render-text]="true"
            [original-size]="false"
            style="width: 100%; height: 800px; display: block;">
        </pdf-viewer>
        </div>
    </div>
</div>
