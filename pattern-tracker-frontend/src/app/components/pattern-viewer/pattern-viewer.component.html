<div class="viewer-container">
    <header class="pattern-header">
        <a routerLink="/patterns" class="button">Back to List</a>
        <h1>{{ patternTitle() }}</h1>
    </header>
    @if (!pdfData()) {
        <div>
            <p>No PDF available</p>
        </div>
    }
    @else {
        <div class="viewer-window">
            <pdf-viewer
                [src]="pdfData()!"
                [render-text]="true"
                [original-size]="false"
                style="width: 100%; height: 800px; display: block;">
            </pdf-viewer>
        </div>
    }
</div>
