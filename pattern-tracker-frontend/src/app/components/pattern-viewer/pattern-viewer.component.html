<div class="viewer-container">
    @if (!blobUrl()) {
        <div class="loading-spinner">
            <p>Loading patterns...</p>
        </div>
    }
    @else {
        <header class="pattern-header">
            <a routerLink="/patterns" class="back-link">Back to List</a>
            <h1>{{ patternTitle() }}</h1>
        </header>

        <div class="viewer-window">
            @if (pdfSrc()) {
                <pdf-viewer
                    [src]="pdfSrc()!"
                    [render-text]="true"
                    [original-size]="false"
                    style="width: 100%; height: 800px; display: block;">
                </pdf-viewer>
            }
        </div>
    }
</div>
